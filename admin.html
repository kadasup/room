<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>逸豆夢房況管理台</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&family=Noto+Serif+TC:wght@700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <span class="hero-tag">逸豆夢後台管理</span>
      <div class="hero-grid">
        <div>
          <h1 class="hero-title">更輕鬆地調整房況，讓檔期維護更直覺。</h1>
          <p class="hero-copy">
            點擊日期就能切換可預約與客滿，並支援整月快速操作。介面與公開頁共用同一套月曆邏輯，
            減少重複維護，也讓桌機與手機操作都更穩定。
          </p>
        </div>
        <aside class="stats-card" aria-label="後台摘要">
          <p class="stats-title">管理摘要</p>
          <div class="stats-grid">
            <div class="stat-chip">
              <strong>單格切換</strong>
              <span>直接點日期就能改狀態</span>
            </div>
            <div class="stat-chip">
              <strong id="summaryText">正在載入中...</strong>
              <span>快速掌握未來三個月總覽</span>
            </div>
            <div class="stat-chip">
              <strong>批次工具</strong>
              <span>一鍵處理本月常見設定</span>
            </div>
          </div>
        </aside>
      </div>
    </section>

    <section class="toolbar" aria-label="月份控制列">
      <label class="field" for="startMonth">
        <span class="field-label">起始月份</span>
        <input id="startMonth" type="month" />
      </label>
      <button id="btnPrev3" class="button button-ghost month-action" type="button">
        往前 3 個月
      </button>
      <button id="btnReload" class="button button-primary month-action" type="button">
        同步最新
      </button>
      <button id="btnNext3" class="button button-secondary month-action" type="button">
        往後 3 個月
      </button>
      <div id="lastSync" class="status-chip" aria-live="polite">等待同步</div>
    </section>

    <section class="admin-panel" aria-label="批次操作">
      <button id="btnSetSatFull" class="button button-secondary" type="button">
        本月未來星期六設為客滿
      </button>
      <button id="btnSetAllFree" class="button button-ghost" type="button">
        本月未來日期全部改為可預約
      </button>
    </section>

    <section class="legend" aria-label="狀態說明">
      <span class="legend-item"><span class="legend-dot ok"></span>可預約</span>
      <span class="legend-item"><span class="legend-dot bad"></span>已客滿</span>
      <span class="legend-item"><span class="legend-dot today"></span>今天</span>
      <span class="legend-item"><span class="legend-dot weekend"></span>週末底色</span>
      <span class="legend-item">點擊未來日期即可直接切換狀態</span>
    </section>

    <div id="calendars" class="calendar-grid" aria-label="房況管理月曆"></div>

    <section class="admin-note">
      <strong>管理提醒：</strong>
      這個頁面仍然是前端帶著 token 呼叫 GAS，方便但安全性有限。若之後要正式長期使用，
      建議把 token 與管理權限移到更安全的驗證流程。
    </section>
  </main>

  <script src="./calendar-core.js"></script>
  <script src="./admin.js"></script>
</body>
</html>
